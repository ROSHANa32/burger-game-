<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Burger Ready! — Idle Burger Shop</title>

  <!-- PWA / mobile -->
  <meta name="theme-color" content="#e8431f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Burger Ready" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="game-wrap">
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-pill" id="money-pill">
        <span class="coin">🪙</span>
        <span id="money">0</span>
      </div>
      <div class="hud-pill" id="level-pill">
        <span>⭐</span>
        <span id="level">1</span>
      </div>
    </div>

    <!-- Big friendly hint banner (tutorial) -->
    <div id="hint" class="hint hidden">
      <span id="hint-text">Tap the big button to cook a burger!</span>
    </div>

    <!-- Tap-to-cook button -->
    <button id="cook-btn" class="cook-btn">
      <span class="cook-emoji">🍔</span>
      <span class="cook-label">COOK</span>
    </button>

    <!-- Upgrade panel -->
    <div id="shop-panel" class="shop-panel">
      <div class="shop-header">
        <span>🛒 UPGRADES</span>
        <button id="shop-close">✕</button>
      </div>
      <div id="shop-list" class="shop-list"></div>
    </div>

    <button id="shop-toggle" class="shop-toggle">
      <span class="st-emoji">🛒</span>
      <span class="st-label">SHOP</span>
    </button>

    <!-- Floating text layer -->
    <div id="float-layer"></div>

    <!-- Title / start screen -->
    <div id="title-screen" class="title-screen">
      <div class="title-inner">
        <div class="title-logo">
          <span class="logo-burger">🍔</span>
          <h1 class="logo-text">BURGER<br><span>READY!</span></h1>
        </div>
        <p class="title-tag">Cook • Serve • Earn • Grow your shop!</p>
        <button id="play-btn" class="play-btn">▶ PLAY</button>
        <button id="reset-btn" class="reset-btn">Reset progress</button>
      </div>
    </div>

    <!-- Welcome back / message modal -->
    <div id="modal" class="modal hidden">
      <div class="modal-card">
        <h1 id="modal-title">🍔 Welcome back!</h1>
        <p id="modal-body"></p>
        <button id="modal-btn">COLLECT</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
